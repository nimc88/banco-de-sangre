<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bludee - Asistente</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--red:#c0392b;--red2:#e74c3c;--red-bg:#fff0f0;--navy:#0d1f35;
      --green:#16a34a;--green-lt:#f0fdf4;--amber:#d97706;--amber-lt:#fffbeb;
      --border:#e2e8f0;--muted:#64748b;--font:'Sora',sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font);background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .dcard{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:40px;max-width:460px;width:100%;text-align:center;color:white;}
    .dcard h1{font-size:1.5rem;font-weight:700;margin:14px 0 8px;}
    .dcard p{color:rgba(255,255,255,.65);font-size:.88rem;line-height:1.6;margin-bottom:22px;}
    .bimg{width:130px;margin:0 auto;display:block;animation:fl 3s ease-in-out infinite;
      filter:drop-shadow(0 8px 20px rgba(192,57,43,.5));}
    @keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
    .dlinks{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
    .dlnk{padding:9px 17px;border-radius:9px;text-decoration:none;font-size:.83rem;font-weight:600;
      background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.18);}
    .dlnk:hover{background:rgba(255,255,255,.22);}
    #ctoggle{position:fixed;bottom:24px;right:24px;z-index:1000;width:68px;height:68px;border-radius:50%;
      background:linear-gradient(135deg,#1a1a2e,#2d1b1b);border:2.5px solid rgba(192,57,43,.6);
      cursor:pointer;padding:0;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.45);
      animation:glw 2.5s infinite;transition:transform .2s;}
    #ctoggle:hover{transform:scale(1.08);}
    #ctoggle img{width:100%;height:100%;object-fit:cover;object-position:center 10%;display:block;transition:opacity .2s;}
    .cx{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
      font-size:22px;color:white;background:rgba(192,57,43,.85);}
    .os .cx{display:flex !important;}.os img{opacity:.25;}
    @keyframes glw{0%,100%{box-shadow:0 6px 28px rgba(0,0,0,.45),0 0 0 0 rgba(192,57,43,.5);}
      50%{box-shadow:0 6px 28px rgba(0,0,0,.45),0 0 0 12px rgba(192,57,43,0);}}
    .cnotif{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;border-radius:10px;
      background:var(--amber);color:white;font-size:.62rem;font-weight:700;display:none;
      align-items:center;justify-content:center;border:2px solid white;padding:0 4px;}
    #cwin{position:fixed;bottom:104px;right:24px;z-index:999;width:390px;background:white;
      border-radius:22px;box-shadow:0 16px 56px rgba(0,0,0,.28);display:flex;flex-direction:column;
      transform:scale(.85) translateY(20px) translateX(10px);opacity:0;pointer-events:none;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .25s;overflow:hidden;max-height:86vh;}
    #cwin.open{transform:scale(1) translateY(0) translateX(0);opacity:1;pointer-events:all;}
    @media(max-width:450px){#cwin{width:calc(100vw - 18px);right:9px;bottom:96px;}}
    .ch{background:linear-gradient(135deg,#1a1a2e 0%,#2d1515 100%);padding:0 16px 14px;
      display:flex;align-items:flex-end;gap:12px;flex-shrink:0;}
    .chav{width:74px;height:74px;flex-shrink:0;margin-bottom:-8px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.45));}
    .chav img{width:100%;height:100%;object-fit:cover;object-position:center 10%;border-radius:50%;border:2.5px solid rgba(192,57,43,.5);}
    .chi{flex:1;padding-top:14px;}
    .chn{font-size:1rem;font-weight:700;color:white;}
    .chs{font-size:.7rem;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;margin-top:2px;}
    .chd{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:bk 2s infinite;}
    @keyframes bk{0%,100%{opacity:1;}50%{opacity:.3;}}
    .chbts{display:flex;gap:6px;padding-top:14px;align-self:flex-start;}
    .chb{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.65);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px;}
    .chb:hover{background:rgba(255,255,255,.22);color:white;}
    .abn{display:none;align-items:flex-start;gap:9px;padding:9px 14px;font-size:.79rem;line-height:1.45;flex-shrink:0;}
    .abn.show{display:flex;}
    .abn.danger{background:#fff0f0;border-bottom:1px solid #fbb6bc;color:#991b1b;}
    .abn.warning{background:var(--amber-lt);border-bottom:1px solid #fcd34d;color:#92400e;}
    .modes{display:flex;border-bottom:1px solid var(--border);background:#fafbfd;flex-shrink:0;}
    .mode{flex:1;padding:8px 4px;border:none;background:none;font-size:.7rem;font-weight:600;
      color:var(--muted);cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;}
    .mode.on{color:var(--red);border-bottom-color:var(--red);}
    .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:220px;}
    .msgs::-webkit-scrollbar{width:4px;}
    .msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    .msg{display:flex;gap:8px;align-items:flex-end;animation:mi .22s ease;}
    .msg.u{flex-direction:row-reverse;}
    @keyframes mi{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
    .mav{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid rgba(192,57,43,.3);}
    .mav img{width:100%;height:100%;object-fit:cover;object-position:center 10%;}
    .uav{width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
    .mb{max-width:82%;padding:10px 13px;border-radius:14px;font-size:.83rem;line-height:1.55;}
    .msg.b .mb{background:#f1f5f9;color:var(--navy);border-bottom-left-radius:4px;}
    .msg.u .mb{background:linear-gradient(135deg,var(--navy),#1e3a5c);color:white;border-bottom-right-radius:4px;}
    .mb p{margin-bottom:4px;}.mb p:last-child{margin-bottom:0;}
    .mb ol,.mb ul{padding-left:16px;margin:5px 0;}.mb li{margin-bottom:3px;}.mb strong{font-weight:600;}
    .mt{font-size:.63rem;color:var(--muted);margin-top:2px;}.msg.u .mt{text-align:right;}
    .typing{display:flex;gap:4px;padding:4px 2px;}
    .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bo .9s infinite;}
    .typing span:nth-child(2){animation-delay:.15s;}.typing span:nth-child(3){animation-delay:.3s;}
    @keyframes bo{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
    .sugs{padding:7px 10px;display:flex;flex-wrap:wrap;gap:5px;border-top:1px solid var(--border);background:#fafbfd;flex-shrink:0;}
    .sug{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:.71rem;
      font-weight:500;color:var(--navy);cursor:pointer;font-family:var(--font);white-space:nowrap;}
    .sug:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
    .inpw{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
    #cinput{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.83rem;
      font-family:var(--font);resize:none;min-height:38px;max-height:80px;color:var(--navy);outline:none;}
    #cinput:focus{border-color:var(--red);}
    #csend{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red2));
      border:none;color:white;cursor:pointer;font-size:15px;flex-shrink:0;}
    #csend:disabled{opacity:.4;cursor:not-allowed;}
  </style>
</head>

  <h1>Bludee - Asistente Virtual</h1>

<div id="cwin">

    <div class="chav"><img id="ch-img" alt="Bludee"></div>
    <div class="chi">
      <div class="chn">Bludee</div>
      <div class="chs"><span class="chd"></span>Asistente - Banco de Sangre PR</div>

      <button class="chb" onclick="cClr()">🗑</button>

    </div>

  <div class="abn" id="abn">
    <span id="abn-ico">!</span>
    <div><strong id="abn-ti"></strong> <span id="abn-tx"></span></div>
  </div>
  <div class="modes">
    <button class="mode on" id="mr" onclick="cM('r')">Rapida</button>
    <button class="mode"    id="mp" onclick="cM('p')">Paso a paso</button>
    <button class="mode"    id="me" onclick="cM('e')">Educativa</button>

  <div class="inpw">
    <textarea id="cinput" placeholder="Preguntale a Bludee..." rows="1"
      onkeydown="cKey(event)" oninput="cRsz(this)"></textarea>

  </div>
</div>

// ── State ─────────────────────────────────────────────────
var cOpen = false;
var cMode = 'r';
var cBusy = false;
var cCtx  = null;

// ── Toggle ────────────────────────────────────────────────
function cTog() {
  cOpen = !cOpen;
  var win = document.getElementById('cwin');
  var btn = document.getElementById('ctoggle');
  var not = document.getElementById('cnotif');
  if (cOpen) {
    win.classList.add('open');
    btn.classList.add('os');
    not.style.display = 'none';
    if (!document.querySelector('.msg')) cWelcome();
  } else {
    win.classList.remove('open');
    btn.classList.remove('os');
  }
}

// ── Welcome ───────────────────────────────────────────────
function cWelcome() {
  var h = new Date().getHours();
  var g = h < 12 ? 'Buenos dias' : h < 18 ? 'Buenas tardes' : 'Buenas noches';
  cBot(g + '! Soy Bludee, tu asistente del banco de sangre. En que te puedo ayudar hoy?');
  cRSugs([
    ['temperatura almacenamiento', 'Temperaturas'],
    ['como registrar una unidad recibida', 'Registrar unidad'],
    ['proceso transfusion pasos', 'Transfusion'],
    ['crossmatch compatibilidad', 'Crossmatch'],
    ['reaccion transfusional', 'Reacciones']
  ]);
  if (cCtx) {
    setTimeout(function() { cBot(cCtx); cCtx = null; }, 800);
  }
}

// ── Mode ──────────────────────────────────────────────────
function cM(m) {
  cMode = m;
  ['r','p','e'].forEach(function(x) { document.getElementById('m'+x).classList.remove('on'); });
  document.getElementById('m' + m).classList.add('on');
  var msgs = { r: 'Modo Rapido activado.', p: 'Modo Paso a Paso activado.', e: 'Modo Educativo activado.' };
  cBot(msgs[m]);
}

// ── Send ──────────────────────────────────────────────────
function cSnd() {
  var inp = document.getElementById('cinput');
  var txt = inp.value.trim();
  if (!txt || cBusy) return;
  inp.value = '';
  cRsz(inp);
  cUser(txt);
  cResp(txt);
}

function cKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); cSnd(); }
}

function cRsz(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function cSC(el) {
  var q = el.getAttribute('data-q');
  if (!q || cBusy) return;
  cUser(q);
  cResp(q);
}

// ── Respond ───────────────────────────────────────────────
function cResp(txt) {
  cBusy = true;
  document.getElementById('csend').disabled = true;
  var tid = cTyp();
  var low = txt.toLowerCase();
  var best = null, bestScore = 0;
  for (var i = 0; i < KB.length; i++) {
    var score = 0;
    for (var j = 0; j < KB[i].k.length; j++) {
      if (low.indexOf(KB[i].k[j]) >= 0) score++;
    }
    if (score > bestScore) { bestScore = score; best = KB[i]; }
  }
  setTimeout(function() {
    cHideTyp(tid);
    if (best && bestScore > 0) {
      cBot(best.r[cMode]);
      cSmSugs(low);
    } else {
      cBot('No tengo informacion especifica sobre eso. Te recomiendo consultar el manual de procedimientos o contactar al director del banco de sangre.');
      cRSugs([
        ['temperatura almacenamiento', 'Temperaturas'],
        ['proceso transfusion', 'Transfusion'],
        ['reaccion transfusional', 'Reacciones']
      ]);
    }
    cBusy = false;
    document.getElementById('csend').disabled = false;
  }, 500 + Math.random() * 600);
}

// ── Smart Suggestions ─────────────────────────────────────
function cSmSugs(low) {
  var list;
  if (low.indexOf('prbc') >= 0 || low.indexOf('globulo') >= 0)
    list = [['cuanto tiempo fuera del refrigerador prbc','Tiempo fuera'],['devolucion unidad','Devolucion'],['reaccion transfusional','Reacciones']];
  else if (low.indexOf('temperatura') >= 0)
    list = [['temperatura plaquetas','Plaquetas'],['temperatura plasma','Plasma'],['corte de luz refrigerador','Corte luz']];
  else if (low.indexOf('compatib') >= 0 || low.indexOf('crossmatch') >= 0)
    list = [['anticuerpos irregulares','Anticuerpos'],['incompatibilidad abo emergencia','Emergencia'],['proceso transfusion pasos','Transfusion']];
  else if (low.indexOf('reacci') >= 0)
    list = [['documentar reaccion transfusion','Documentar'],['plaquetas temperatura','Plaquetas'],['proceso transfusion','Transfusion']];
  else
    list = [['temperatura almacenamiento','Temperaturas'],['proceso transfusion','Transfusion'],['crossmatch compatibilidad','Crossmatch']];
  cRSugs(list);
}

function cHideTyp(id) { var el = document.getElementById(id); if (el) el.remove(); }
function cScr() { var m = document.getElementById('cmsgs'); m.scrollTop = m.scrollHeight; }
function cT() { return new Date().toLocaleTimeString('es-PR', { hour: '2-digit', minute: '2-digit' }); }
function cE(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function cF(txt) {
  var s = cE(txt);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|\n)(\d+)\. ([^\n]+)/g, function(m, p, n, t) { return '<li>' + t + '</li>'; });
  s = s.replace(/(^|\n)- ([^\n]+)/g, function(m, p, t) { return '<li>' + t + '</li>'; });
  s = s.replace(/(<li>[^<]*<\/li>)+/g, function(m) { return '<ol>' + m + '</ol>'; });
  s = s.replace(/\n\n+/g, '</p><p>');
  s = s.replace(/\n/g, '<br>');
  return '<p>' + s + '</p>';
}

function cRSugs(list) {
  document.getElementById('csugs').innerHTML = list.map(function(s) {
    return '<button class="sug" data-q="' + s[0] + '" onclick="cSC(this)">' + s[1] + '</button>';
  }).join('');
}

function cClr() {
  document.getElementById('cmsgs').innerHTML = '';
  cWelcome();
}

// ── Firebase Alerts ───────────────────────────────────────
function showAlert(type, title, msg) {
  var b = document.getElementById('abn');
  document.getElementById('abn-ico').textContent = type === 'danger' ? 'ALERTA' : 'AVISO';
  document.getElementById('abn-ti').textContent = title;
  document.getElementById('abn-tx').textContent = msg;
  b.className = 'abn ' + type + ' show';
  cBot('Alerta: ' + title + ' - ' + msg);
  var not = document.getElementById('cnotif');
  not.style.display = 'flex';
  not.textContent = '!';
  setTimeout(function() { b.classList.remove('show'); }, 10000);
}

function initFBAlerts() {
  if (!db) return;
  try {
    var firstInv = true;
    db.collection('entradas_unidades').onSnapshot(function(snap) {
      if (firstInv) { firstInv = false; return; }
      var today = new Date();
      snap.forEach(function(doc) {
        var d = doc.data();
        if (!d.fechaExpiracion || d.eliminado) return;
        var diff = Math.ceil((new Date(d.fechaExpiracion) - today) / 86400000);
        if (diff < 0)      showAlert('danger',  'Unidad Vencida', 'Unidad ' + (d.numeroUnidad || doc.id) + ' esta VENCIDA.');
        else if (diff <= 3) showAlert('warning', 'Por Vencer',    'Unidad ' + (d.numeroUnidad || doc.id) + ' vence en ' + diff + ' dia(s).');
      });
    });
    var firstCar = true;
    db.collection('indicadores_calidad').where('estado', '==', 'En transito').onSnapshot(function(snap) {
      if (firstCar) { firstCar = false; return; }
      var now = new Date();
      snap.forEach(function(doc) {
        var d = doc.data();
        if (!d.fechaGuardado) return;
        var mins = Math.round((now - new Date(d.fechaGuardado)) / 60000);
        if (mins > 120) showAlert('warning', 'Carreo sin confirmar', (d.idSolicitud || 'Carreo') + ' lleva ' + mins + ' min en transito sin confirmar llegada.');
      });
    });
    var firstDes = true;
    db.collection('despachos_emergencia').orderBy('fechaGuardado', 'desc').limit(1).onSnapshot(function(snap) {
      if (firstDes) { firstDes = false; return; }
      snap.docChanges().forEach(function(ch) {
        if (ch.type === 'added') {
          var d = ch.doc.data();
          showAlert('danger', 'Despacho de Emergencia', 'Nueva unidad de emergencia para ' + (d.nombrePaciente || 'paciente') + '.');
        }
      });
    });
  } catch(e) { console.log('FB alerts:', e.message); }
}

// ── Context & Init ────────────────────────────────────────
window.addEventListener('load', function() {
  var p = window.location.pathname;
  if (p.indexOf('compatibilidad') >= 0 || p.indexOf('crossmatch') >= 0)
    cCtx = 'Estas en el modulo de Crossmatch. Necesitas ayuda con la prueba de compatibilidad?';
  else if (p.indexOf('indicadores') >= 0)
    cCtx = 'Estas en Indicadores TAT. Te ayudo a completar un registro?';
  else if (p.indexOf('inventario') >= 0)
    cCtx = 'Estas en Inventario. Quieres saber sobre temperaturas o vigencia de componentes?';
  else if (p.indexOf('despacho') >= 0)
    cCtx = 'Estas en Despacho. Recuerda verificar: 2 identificadores del paciente, ABO/Rh, numero de unidad y expiracion.';
  if (cCtx) document.getElementById('cnotif').style.display = 'flex';
  loadFirebase();
});
